name: Neural Network Auto-Train

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # Ye har raat 12 baje apne aap chalega!

jobs:
  ai-training-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy mysql-connector-python

    - name: Run AI Brain
      run: python mini_brain.py