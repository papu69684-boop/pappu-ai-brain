name: Neural Network Auto-Train

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  ai-training-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4  # <--- v3 ko v4 kar diya (Modern version)

    - name: Setup Python
      uses: actions/setup-python@v5  # <--- v4 ko v5 kar diya (Modern version)
      with:
        python-version: '3.11'  # Naya Python version use karte hain

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests numpy mysql-connector-python

    - name: Run AI Brain
      run: python mini_brain.py

      - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests numpy pandas scikit-learn # <-- Nayi libraries

        - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests numpy scikit-learn  # <--- In teeno ka hona zaroori hai